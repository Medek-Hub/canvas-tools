<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Airway Math Arena</title><style>*{box-sizing:border-box;touch-action:none;user-select:none}body{margin:0;height:100vh;background:#020713;color:white;font-family:Impact,Arial Narrow Bold,sans-serif;overflow:hidden}.app{height:100vh;display:grid;grid-template-rows:9vh 10vh 17vh 1fr 14vh;gap:7px;padding:8px;background:radial-gradient(circle at 10% 0,#134058,transparent 24%),linear-gradient(135deg,#03101e,#08213b,#020713)}.p{border:1px solid #34d8ff66;border-radius:14px;background:linear-gradient(#081c30,#020812);box-shadow:0 0 12px #000,inset 0 0 14px #34d8ff22}.head{display:grid;grid-template-columns:70px 1fr 170px;align-items:center;text-align:center}.star{font-size:48px;color:#d8f0ff;text-shadow:0 0 12px #34d8ff}.title{font-size:clamp(24px,3vw,40px);letter-spacing:.06em;text-shadow:0 2px #000}.title span,.mode b,.phase b{color:#ffcc28}.sub{font:12px Arial Black;color:#dcecf7}.score{display:grid;grid-template-columns:repeat(var(--n,5),1fr);gap:7px}.card{border-radius:12px;text-align:center;padding:6px}.red{background:linear-gradient(#c82735,#7a0913)}.orange{background:linear-gradient(#df7b1e,#813a04)}.green{background:linear-gradient(#50a948,#1f641f)}.blue{background:linear-gradient(#2482e5,#103f82)}.purple{background:linear-gradient(#884fc3,#401b67)}.pts{font-size:clamp(22px,3vw,35px)}.qrow{display:grid;grid-template-columns:110px 1fr 130px;gap:8px;padding:8px}.badge{display:grid;place-items:center;background:linear-gradient(#bd1726,#700711);border-radius:12px;text-align:center}.badge b,.time{font-size:clamp(34px,5vw,58px);color:#ffcc28}.qbox{display:grid;grid-template-columns:65px 1fr auto;align-items:center;gap:8px;background:linear-gradient(#fff,#eceae4);color:#111;border-radius:14px;border:2px solid #0008;padding:8px;overflow:hidden}.emoji{font-size:clamp(34px,5vw,60px)}.qtext{font:clamp(18px,3vw,38px) Arial Black;line-height:1.05}.timer{display:grid;place-items:center;text-align:center}.arena{display:grid;grid-template-rows:28px 1fr;padding:8px}.top{font:13px Arial Black;color:#34d8ff;letter-spacing:.08em}.play{display:grid;grid-template-columns:repeat(var(--n,5),minmax(0,1fr));gap:8px;min-height:0}.col{display:grid;grid-template-rows:44px 1fr 42px;border-radius:14px;overflow:hidden;border:1px solid #fff4;min-width:0}.name,.res{display:grid;place-items:center;text-align:center;text-shadow:0 2px #000}.ans{display:grid;gap:6px;padding:8px}.choice{border:2px solid #fff7;border-radius:12px;background:linear-gradient(#fff,#e6e6e6);color:#111;display:grid;place-items:center;text-align:center;font-family:Arial Black;cursor:pointer;padding:4px;min-height:0}.choice b{font-size:clamp(15px,3vw,38px)}.choice small{font-size:clamp(7px,1vw,12px)}.sel{outline:5px solid #ffcc28}.ok{outline:5px solid #42ff75}.bad{outline:5px solid #ff4f61}.foot{display:grid;grid-template-columns:140px 1fr 430px;gap:8px}.phase,.feed,.ctrl{padding:8px}.phase,.feed{display:grid;place-items:center;text-align:center}.feed{font:clamp(11px,1.3vw,16px) Arial Black}.ctrl{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}button{border-radius:10px;border:1px solid #fff5;background:linear-gradient(#164262,#071523);color:white;font-family:Impact;font-size:clamp(10px,1.1vw,15px)}.start{background:linear-gradient(#43a83d,#1d611f)}.next{background:linear-gradient(#2583e6,#104f9e)}.reset{background:linear-gradient(#d93645,#76101a)}.gold{background:linear-gradient(#dbad16,#71500a);color:white}.modal{position:fixed;inset:0;background:#000c;display:none;place-items:center;z-index:5}.show{display:grid}.box{width:min(900px,88vw);max-height:88vh;overflow:auto;border:2px solid #34d8ff;border-radius:18px;background:#071a2d;padding:20px;text-align:center}.box h2{color:#ffcc28;font-size:clamp(28px,4vw,52px);margin:0 0 8px}.setup{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.setup div{border-radius:12px;padding:10px}table{width:100%;border-collapse:collapse;font:14px Arial Black}td,th{border:1px solid #ffffff33;padding:6px}@media(max-width:1050px),(max-height:690px){.app{grid-template-rows:8vh 8vh 16vh 1fr 13vh;padding:5px}.head{grid-template-columns:50px 1fr 120px}.star{font-size:34px}.qrow{grid-template-columns:80px 1fr 100px}.qbox{grid-template-columns:42px 1fr auto}.qtext{font-size:clamp(14px,2.4vw,26px)}.foot{grid-template-columns:100px 1fr 320px}.ctrl{grid-template-columns:repeat(4,1fr)}.choice small{display:none}.setup{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class='app'><div class='head p'><div class='star'>⚕</div><div><div class='title'>AIRWAY + <span>MATH ARENA</span></div><div class='sub'>Squad battle • no spoiler answer box • multi-touch taps</div></div><div class='mode'><b id='stg'>STAGE 1</b><div id='sts'>Airway</div></div></div><div id='scores' class='score'></div><div class='qrow p'><div class='badge'><span id='round'>ROUND</span><b id='qn'>1</b><span id='qt'>of 4</span></div><div class='qbox'><div id='em' class='emoji'>🫁</div><div id='qt2' class='qtext'>Press START.</div><button id='aud' class='gold' onclick='playSound()'>▶ SOUND</button></div><div class='timer'><span id='tl'>READY</span><b id='tm' class='time'>10</b></div></div><div class='arena p'><div class='top'>ANSWER ARENA — answers stay hidden until reveal</div><div id='play' class='play'></div></div><div class='foot'><div class='phase p'><b id='ph'>READY</b><small id='ps'>Choose squads</small></div><div id='feed' class='feed p'>Use ⚙ SQUADS to choose participating groups.</div><div class='ctrl p'><button class='start' onclick='start()'>▶ START</button><button onclick='pause()'>⏸ PAUSE</button><button class='next' onclick='nextQ()'>➡ NEXT</button><button class='next' onclick='nextS()'>⏭ STAGE</button><button class='reset' onclick='reset()'>↻ RESET</button><button onclick='showSetup()'>⚙ SQUADS</button><button class='gold' onclick='snd=!snd;this.textContent=snd?`🔊 SOUND`:`🔇 MUTED`'>🔊 SOUND</button><button onclick='testSound()'>♪ TEST</button><button onclick='csv()'>⬇ CSV</button><button onclick='json()'>⬇ JSON</button><button onclick='help()'>? HELP</button><button onclick='finalScore()'>🏁 SCORE</button></div></div></div><div id='modal' class='modal'><div class='box'><h2 id='mh'>Results</h2><div id='mb'></div><button class='start' onclick='modal.classList.remove(`show`)'>OK</button></div></div><div id='setupModal' class='modal'><div class='box'><h2>Choose Participating Squads</h2><div id='setup' class='setup'></div><button class='start' onclick='applySetup()'>APPLY</button><button onclick='allOn(1)'>ALL ON</button><button onclick='allOn(0)'>ALL OFF</button><button class='reset' onclick='setupModal.classList.remove(`show`)'>CLOSE</button></div></div><script>let squads=[['Squad 1','red',0,1],['Squad 2','orange',0,1],['Squad 3','green',0,1],['Squad 4','blue',0,1],['Squad 5','purple',0,1]],si=0,qi=0,state='ready',left=10,tick=null,startMs=0,resp=Array(5).fill(null),log=[],snd=1,ctx=null;let stages=[{n:'Airway First Look',h:10,t:22,p:100,c:[['AIR','Airway'],['VENT','Ventilation'],['OXY','Oxygenation'],['PERF','Perfusion']],q:[['😴','Unresponsive patient has snoring respirations after a seizure. What is failing first?','AIR','Airway obstruction','Snoring means soft-tissue obstruction until fixed.'],['🫁','Asthma patient speaks one word with poor chest rise. Main failure?','VENT','Ventilation failure','Bronchospasm increases resistance and decreases tidal volume.'],['🩸','Normal chest rise but SpO₂ stays 82%. Main failure?','OXY','Oxygenation failure','Air moves, but oxygen loading/gas exchange is failing.'],['💔','Good breath sounds but pale hypotensive trauma patient is altered. Main failure?','PERF','Perfusion failure','Circulation is failing to deliver oxygen.']]},{n:'Breath Sound Throwdown',a:1,h:8,t:24,p:120,c:[['WHEEZE','Wheeze'],['STRID','Stridor'],['CRACK','Crackles'],['SNORE','Snoring']],q:[['🔊','Listen and identify the airway or lung sound.','WHEEZE','Wheeze','Wheeze suggests narrowed lower airways.','wheeze'],['🔊','Listen and identify the airway or lung sound.','STRID','Stridor','Stridor is an upper airway danger sound.','stridor'],['🔊','Listen and identify the airway or lung sound.','SNORE','Snoring','Snoring suggests soft tissue obstruction.','snore'],['🔊','Listen and identify the airway or lung sound.','CRACK','Crackles','Crackles may suggest fluid, secretions, or alveolar reopening.','crack']]},{n:'EtCO₂ Pattern Match',h:10,t:24,p:120,c:[['LOW','Low'],['NORM','Normal'],['HIGH','High'],['SHARK','Shark-fin'],['ROSC','ROSC clue']],q:[['🦈','Asthma patient has rising EtCO₂ and a shark-fin waveform. Pattern?','SHARK','Bronchospasm waveform','Slanted upstroke means obstructed exhalation.'],['📈','Sedated patient RR 6/min has EtCO₂ 62. Main issue?','HIGH','Hypoventilation','CO₂ is accumulating because minute ventilation is too low.'],['🫀','During CPR EtCO₂ jumps from 12 to 38. What could it suggest?','ROSC','ROSC clue','A sudden sustained rise can suggest return of circulation.']]},{n:'Math Sprint',h:12,t:32,p:150,c:[['5','5'],['6','6'],['10','10'],['70','70'],['100','100']],q:[['🧠','Midazolam 0.1 mg/kg for a 50 kg seizure patient. Dose in mg?','5','5 mg','50 × 0.1 = 5 mg.'],['🍬','Dextrose 0.5 g/kg for a 20 kg child. Dose in grams?','10','10 g','20 × 0.5 = 10 g.'],['🫁','BVM rate 10/min with 600 mL tidal volume. Minute ventilation in L/min?','6','6 L/min','600 × 10 = 6000 mL/min = 6 L/min.'],['💉','Ketamine 1 mg/kg IV for a 70 kg patient. Dose in mg?','70','70 mg','70 × 1 = 70 mg.']]}];function A(){return squads.map((s,i)=>({s,i})).filter(x=>x.s[3])}function S(){return stages[si]}function Q(){return S().q[qi]}function render(){document.documentElement.style.setProperty('--n',A().length||1);stg.textContent='STAGE '+(si+1);sts.textContent=S().n;round.textContent=S().n.toUpperCase().split(' ')[0];qn.textContent=qi+1;qt.textContent='of '+S().q.length;em.textContent=Q()[0];qt2.textContent=Q()[1];aud.style.display=S().a?'block':'none';scores.innerHTML=A().map(x=>`<div class='card ${x.s[1]}'><div>${x.s[0]}</div><div class='pts'>${x.s[2]}</div><small>${resp[x.i]?state=='reveal'?(resp[x.i].ok?'+'+resp[x.i].pts:'MISS'):'LOCKED':''}</small></div>`).join('');play.innerHTML=A().map(x=>`<div class='col ${x.s[1]}'><div class='name'>${x.s[0]}</div><div class='ans'>${S().c.map(c=>`<div class='choice ${cls(x.i,c[0])}' onpointerdown='pick(event,${x.i},\`${c[0]}\`)'><b>${c[0]}</b><small>${c[1]}</small></div>`).join('')}</div><div class='res'>${res(x.i)}</div></div>`).join('')}function cls(i,v){let r=resp[i];if(!r)return state=='answer'?'':'disabled';if(r.v==v)return state=='reveal'?(r.ok?'ok':'bad'):'sel';return 'disabled'}function res(i){let r=resp[i];return !r?(state=='answer'?'WAITING':'READY'):state=='reveal'?(r.ok?'CORRECT':'MISS'):'LOCKED'}function start(){if(!A().length)return alert('Select at least one squad.');resp=Array(5).fill(null);setPhase('huddle',S().h)}function setPhase(p,sec){clearInterval(tick);state=p;left=sec;tm.textContent=left;tl.textContent=p.toUpperCase();ph.textContent=p=='huddle'?'HUDDLE':p=='answer'?'ANSWER':p=='reveal'?'RESULTS':'READY';feed.textContent=p=='huddle'?'Teams reason through physiology. No answers lock yet.':p=='answer'?'Each active squad taps one answer.':'Review the why.';render();tick=setInterval(()=>{left--;tm.textContent=left;if(snd)tone(left<6?950:600,.035);if(left<=0){clearInterval(tick);p=='huddle'?answer():reveal()}},1000)}function answer(){startMs=Date.now();setPhase('answer',S().t);if(S().a)setTimeout(playSound,200)}function pick(e,i,v){e.preventDefault();if(state!='answer'||resp[i])return;let ok=v==Q()[2],pts=ok?S().p+Math.ceil(left/S().t*25):0;resp[i]={v,ok,pts,ms:Date.now()-startMs};if(ok)squads[i][2]+=pts;if(snd)tone(ok?880:220,.08);render();if(A().every(x=>resp[x.i]))setTimeout(reveal,350)}function reveal(){if(state=='reveal')return;clearInterval(tick);state='reveal';tm.textContent=0;tl.textContent='REVEAL';feed.textContent=Q()[4];A().forEach(x=>{let r=resp[x.i];log.push({stage:S().n,topic:Q()[3],question:Q()[1],correct:Q()[2],squad:x.s[0],response:r?r.v:'NO ANSWER',is_correct:r?!!r.ok:false,points:r?r.pts:0,ms:r?r.ms:''})});render();results()}function results(){mh.textContent=S().n+' Round '+(qi+1);mb.innerHTML=`<p><b>Correct:</b> ${Q()[3]}</p><p>${Q()[4]}</p><table><tr><th>Squad</th><th>Answer</th><th>Result</th><th>Pts</th></tr>${A().map(x=>{let r=resp[x.i];return `<tr><td>${x.s[0]}</td><td>${r?r.v:'No answer'}</td><td>${r&&r.ok?'✅':'❌'}</td><td>${r?r.pts:0}</td></tr>`}).join('')}</table>`;modal.classList.add('show')}function nextQ(){modal.classList.remove('show');clearInterval(tick);if(qi<S().q.length-1){qi++;state='ready';tm.textContent=S().h;tl.textContent='READY';render()}else nextS()}function nextS(){modal.classList.remove('show');clearInterval(tick);if(si<stages.length-1){si++;qi=0;state='ready';tm.textContent=S().h;render()}else finalScore()}function pause(){clearInterval(tick);state='ready';feed.textContent='Paused. Press START to restart this round.';render()}function reset(){clearInterval(tick);si=0;qi=0;state='ready';resp=Array(5).fill(null);log=[];squads.forEach(s=>s[2]=0);render()}function finalScore(){mh.textContent='Final Score';mb.innerHTML=`<table><tr><th>Squad</th><th>Points</th></tr>${A().sort((a,b)=>b.s[2]-a.s[2]).map(x=>`<tr><td>${x.s[0]}</td><td>${x.s[2]}</td></tr>`).join('')}</table>`;modal.classList.add('show')}function showSetup(){setup.innerHTML=squads.map((s,i)=>`<div class='${s[1]}'><label><input id='on${i}' type='checkbox' ${s[3]?'checked':''}> ACTIVE</label><input id='nm${i}' value='${s[0]}' maxlength='16'></div>`).join('');setupModal.classList.add('show')}function applySetup(){let n=0;squads.forEach((s,i)=>{s[3]=document.getElementById('on'+i).checked?1:0;if(s[3])n++;s[0]=document.getElementById('nm'+i).value||'Squad '+(i+1)});if(!n)return alert('Select at least one squad.');setupModal.classList.remove('show');render()}function allOn(v){squads.forEach((s,i)=>{let e=document.getElementById('on'+i);if(e)e.checked=!!v})}function dl(n,t,m){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:m}));a.download=n;a.click()}function json(){dl('airway_math_arena_metrics.json',JSON.stringify({squads,log},null,2),'application/json')}function csv(){let h=['stage','topic','question','correct','squad','response','is_correct','points','ms'];dl('airway_math_arena_metrics.csv',[h.join(','),...log.map(r=>h.map(k=>(''+r[k]).replaceAll(',',';')).join(','))].join('\n'),'text/csv')}function help(){mh.textContent='How to run';mb.innerHTML='<p>Choose squads, press START, let teams huddle, then answer. Data exports by CSV/JSON.</p>';modal.classList.add('show')}function AC(){if(!ctx)ctx=new(AudioContext||webkitAudioContext)();if(ctx.state=='suspended')ctx.resume();return ctx}function tone(f,d){let c=AC(),o=c.createOscillator(),g=c.createGain();o.frequency.value=f;g.gain.value=.06;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d);o.stop(c.currentTime+d+.02)}function playSound(){if(!S().a)return;let k=Q()[5]||'wheeze';synth(k);feed.textContent='Sound played. Answer stays hidden until reveal.'}function testSound(){['wheeze','stridor','snore','crack'].forEach((x,i)=>setTimeout(()=>synth(x),i*700))}function synth(k){let c=AC(),n=c.currentTime;function o(f,t,d=.7,v=.12,del=0){let x=c.createOscillator(),g=c.createGain();x.type=t;x.frequency.value=f;g.gain.setValueAtTime(v,n+del);g.gain.exponentialRampToValueAtTime(.0001,n+del+d);x.connect(g);g.connect(c.destination);x.start(n+del);x.stop(n+del+d+.03)}function z(d=.3,v=.12,del=0){let b=c.createBuffer(1,c.sampleRate*d,c.sampleRate),a=b.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*(1-i/a.length);let s=c.createBufferSource(),g=c.createGain();s.buffer=b;g.gain.value=v;s.connect(g);g.connect(c.destination);s.start(n+del)}if(k=='wheeze'){o(650,'sine',1.1,.14);o(900,'sine',1.1,.07)}else if(k=='stridor'){o(1100,'sawtooth',1.1,.13)}else if(k=='snore'){o(90,'sawtooth',.5,.18);z(.45,.08);o(82,'sawtooth',.5,.18,.7)}else{for(let i=0;i<14;i++)z(.025,.16,i*.08)}}render();showSetup();</script></body></html>
